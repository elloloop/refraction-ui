name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Build all packages
        run: pnpm turbo build --filter='./packages/*'

      - name: Build docs site
        run: GITHUB_PAGES=true pnpm --filter refraction-ui-docs build

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          channel: 'stable'

      - name: Build Flutter UI Prototype
        working-directory: packages/flutter
        run: make build-web
        
      - name: Merge Flutter Web into Docs
        run: |
          mkdir -p docs-site/out/flutter
          cp -r packages/flutter/example/build/web/* docs-site/out/flutter/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
