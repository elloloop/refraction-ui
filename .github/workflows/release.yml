name: Release

on:
  push:
    branches:
      - main
      - stable

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint Commit Messages
        uses: wagoid/commitlint-github-action@v5

  determine-changes:
    runs-on: ubuntu-latest
    outputs:
      packages_changed: ${{ steps.check.outputs.packages_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for package changes
        id: check
        run: |
          BASE_COMMIT=$(git rev-parse ${{ github.sha }}~1 2>/dev/null || echo "")
          if [ -z "$BASE_COMMIT" ]; then
            echo "packages_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if git diff --name-only "$BASE_COMMIT" "${{ github.sha }}" | grep -q "^packages/"; then
            echo "packages_changed=true" >> $GITHUB_OUTPUT
          else
            echo "packages_changed=false" >> $GITHUB_OUTPUT
          fi

  build-test:
    runs-on: ubuntu-latest
    needs: [commit-lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter='./packages/*'
      - run: pnpm turbo test --continue

  release:
    if: needs.determine-changes.outputs.packages_changed == 'true'
    needs: [build-test, determine-changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter='./packages/*'
      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx multi-semantic-release

  dependabot-auto-merge:
    needs: [build-test]
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge Dependabot PRs
        uses: fastify/github-action-merge-dependabot@v3
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          target: minor
