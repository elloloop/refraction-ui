name: Release

on:
  push:
    branches:
      - main
      - stable

permissions:
  contents: write
  id-token: write

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint Commit Messages
        uses: wagoid/commitlint-github-action@v5

  determine-changes:
    runs-on: ubuntu-latest
    outputs:
      packages_changed: ${{ steps.check.outputs.packages_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for package changes
        id: check
        run: |
          BASE_COMMIT=$(git rev-parse ${{ github.sha }}~1 2>/dev/null || echo "")
          if [ -z "$BASE_COMMIT" ]; then
            echo "packages_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE_COMMIT" "${{ github.sha }}")
          if echo "$CHANGED" | grep -qE "^packages/|^\.releaserc|^package\.json|^pnpm-lock"; then
            echo "packages_changed=true" >> $GITHUB_OUTPUT
          else
            echo "packages_changed=false" >> $GITHUB_OUTPUT
          fi

  build-test:
    runs-on: ubuntu-latest
    needs: [commit-lint]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter='./packages/*'
      - run: pnpm turbo test --continue

  release:
    if: needs.determine-changes.outputs.packages_changed == 'true'
    needs: [build-test, determine-changes]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter='./packages/*'
      - name: Get npm token via OIDC
        run: |
          OIDC_RESPONSE=$(curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://registry.npmjs.org" \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}")
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value')
          if [ "$OIDC_TOKEN" = "null" ] || [ -z "$OIDC_TOKEN" ]; then
            echo "Failed to get OIDC token from GitHub"
            echo "$OIDC_RESPONSE" | jq .
            exit 1
          fi
          NPM_RESPONSE=$(curl -sS -X POST 'https://registry.npmjs.org/-/npm/v1/security/oidc/token' \
            -H 'Content-Type: application/json' \
            -d "{\"oidcToken\": \"${OIDC_TOKEN}\"}")
          NPM_TOKEN=$(echo "$NPM_RESPONSE" | jq -r '.token')
          if [ "$NPM_TOKEN" = "null" ] || [ -z "$NPM_TOKEN" ]; then
            echo "Failed to exchange OIDC token for npm token"
            echo "$NPM_RESPONSE" | jq .
            exit 1
          fi
          echo "NPM_TOKEN=${NPM_TOKEN}" >> $GITHUB_ENV
          echo "::add-mask::${NPM_TOKEN}"
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          npm whoami
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx multi-semantic-release --ignore-private-packages

  dependabot-auto-merge:
    needs: [build-test]
    runs-on: ubuntu-latest
    steps:
      - name: Auto-merge Dependabot PRs
        uses: fastify/github-action-merge-dependabot@v3
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          target: minor
