name: Test Matrix
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
        pnpm-version: [10.13.1]
        include:
          - node-version: 20
            pnpm-version: 10.13.1
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: ${{ matrix.pnpm-version }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Setup Turborepo Caching
        uses: dtinth/setup-github-actions-caching-for-turbo@v1
      - name: Install dependencies
        run: make install
      - name: Run CI
        run: make ci

  browser-tests:
    runs-on: ubuntu-latest
    needs: test-matrix
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Setup Turborepo Caching
        uses: dtinth/setup-github-actions-caching-for-turbo@v1
      - name: Install dependencies
        run: make install
      - name: Build packages
        run: make build
      - name: Run Storybook tests
        run: make storybook
      - name: Run accessibility tests
        run: make a11y

  performance-regression:
    runs-on: ubuntu-latest
    needs: test-matrix
    if: github.event-name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - name: Setup Turborepo Caching
        uses: dtinth/setup-github-actions-caching-for-turbo@v1
      - name: Install dependencies
        run: make install
      - name: Build for performance testing
        run: make build
      - name: Run bundle size analysis
        run: make size-analyze
      - name: Check for performance regressions
        run: |
          # This would integrate with your preferred performance monitoring tool
          # For now, we'll just check bundle sizes
          echo "Performance regression check completed"
